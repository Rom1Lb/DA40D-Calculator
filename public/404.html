<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DA40-D Calculator</title>
    <script>
      var path = window.location.pathname;
      var base = "/DA40D-Calculator";
      var rest = path.startsWith(base) ? path.slice(base.length) : path;
      if (!rest.startsWith("/")) rest = "/" + rest;
      sessionStorage.setItem(
        "spa_redirect",
        rest + window.location.search + window.location.hash,
      );
      window.location.replace(base + "/");
    </script>
  </head>
  <body></body>
</html>
