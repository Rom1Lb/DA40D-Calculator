<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1117" />
    <title>DA40-D Calculator</title>
    <link rel="icon" type="image/svg+xml" href="/DA40D-Calculator/icon.svg" />
    <script>
      // Restore path after GitHub Pages 404 redirect
      (function () {
        var redir = sessionStorage.getItem("spa_redirect");
        if (redir) {
          sessionStorage.removeItem("spa_redirect");
          window.history.replaceState(null, "", "/DA40D-Calculator" + redir);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
